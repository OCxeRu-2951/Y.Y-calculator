<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電卓</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2b2b2b;
            color: #f4f4f9;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 48px;
            color: #ffffff;
            margin-bottom: 20px;
        }

        input {
            width: 300px;
            padding: 20px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            text-align: right;
            background-color: #444;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 24px;
            background-color: #6200ea;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #3700b3;
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(2px);
        }

        .clear,
        .backspace,
        .equal,
        .sqrt {
            background-color: #ff5722;
        }

        .clear:hover,
        .backspace:hover,
        .equal:hover,
        .sqrt:hover {
            background-color: #d84315;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            text-align: left;
            font-family: monospace;
            padding: 20px;
            z-index: 9999;
            overflow-y: auto;
        }

        .console-text {
            white-space: pre;
            font-size: 16px;
            line-height: 1.5em;
        }

        .spinner {
            display: inline-block;
        }

        .startup-complete {
            color: #00ff00;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>電卓</h1>
    <div id="gennumber">
        <form name="calculator" onsubmit="backend(); return false;">
            <input type="text" id="gennumberform" placeholder="式を入力してください" readonly>
            <div class="buttons">
                <button type="button" class="clear">C</button>
                <button type="button" class="backspace">⌫</button>
                <button type="button" class="input" data-value="%">%</button>
                <button type="button" class="input" data-value="+">+</button>
                <button type="button" class="input" data-value="1">1</button>
                <button type="button" class="input" data-value="2">2</button>
                <button type="button" class="input" data-value="3">3</button>
                <button type="button" class="input" data-value="-">-</button>
                <button type="button" class="input" data-value="4">4</button>
                <button type="button" class="input" data-value="5">5</button>
                <button type="button" class="input" data-value="6">6</button>
                <button type="button" class="input" data-value="*">×</button>
                <button type="button" class="input" data-value="7">7</button>
                <button type="button" class="input" data-value="8">8</button>
                <button type="button" class="input" data-value="9">9</button>
                <button type="button" class="input" data-value="/">÷</button>
                <button type="button" class="input" data-value="e">e</button>
                <button type="button" class="input" data-value="0">0</button>
                <button type="button" class="input" data-value=".">.</button>
                <button type="button" class="equal">=</button>
                <button type="button" class="input" data-value="(">(</button>
                <button type="button" class="input" data-value=")">)</button>
                <button type="button" class="input" data-value="π">π</button>
                <button type="button" class="sqrt">√</button>
            </div>
        </form>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div id="consoleOutput" class="console-text"></div>
        <div class="spinner" id="spinner">-</div>
        <div id="startupComplete" class="startup-complete" style="display: none;">
            Start complete
        </div>
    </div>

    <footer>
        <b>&copy; 2024 BPkrEh_7406</b>
        <!--ROT18→BPkrEh_7406-->
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            var consoleMessages = [
                "System Initializing...",
                "Loading resources...",
                "Starting components...",
                "Fetching data from server...",
                "Verifying credentials...",
                "Launching the interface...",
                "Process complete."
            ];

            var spinnerFrames = ['-', '\\', '|', '/']; // スピナーアニメーションのフレーム
            var spinnerIndex = 0;

            function updateSpinner() {
                $('#spinner').text(spinnerFrames[spinnerIndex]);
                spinnerIndex = (spinnerIndex + 1) % spinnerFrames.length;
            }

            // 値を追加
            $('.input').click(function () {
                var value = $(this).data('value');
                $('#gennumberform').val($('#gennumberform').val() + value);
            });

            // クリア
            $('.clear').click(function () {
                var inputValue = $('#gennumberform').val();

                // 32442の時にリダイレクト
                if (parseInt(inputValue) === 32442) {
                    $('#loadingOverlay').fadeIn(); // ローディングアニメーションを表示

                    var i = 0;
                    var intervalId = setInterval(function () {
                        if (i < consoleMessages.length) {
                            $('#consoleOutput').append(consoleMessages[i] + "\n");
                            i++;
                        } else {
                            clearInterval(intervalId);
                            $('#startupComplete').fadeIn(); // 起動完了メッセージを表示
                            clearInterval(spinnerInterval); // スピナーを止める
                            setTimeout(function () {
                                window.location.href = "/"; // リダイレクト
                            }, 2000); // 2秒後にリダイレクト
                        }
                    }, 800); // 800msごとにメッセージを表示

                    var spinnerInterval = setInterval(updateSpinner, 100); // 100msごとにスピナーを更新
                } else {
                    $('#gennumberform').val('');
                }
            });

            // バックスペース
            $('.backspace').click(function () {
                var currentValue = $('#gennumberform').val();
                $('#gennumberform').val(currentValue.slice(0, -1));
            });

            // 平方根
            $('.sqrt').click(function () {
                var inputValue = $('#gennumberform').val();
                var result = Math.sqrt(eval(inputValue));
                $('#gennumberform').val(result);
            });

            // 計算
            $('.equal').click(function () {
                var inputValue = $('#gennumberform').val();
                inputValue = inputValue.replace(/π/g, Math.PI);
                inputValue = inputValue.replace(/e/g, Math.E);
                inputValue = inputValue.replace(/%/g, '/100');
                var result = eval(inputValue);
                $('#gennumberform').val(result);
            });
        });

        function backend() {
            // AJAXリクエストを送信
            $.ajax({
                url: '/c',
                type: 'GET',
                data: {
                    q: $('#gennumberform').val() // フォームの値をクエリとして送信
                },
                success: function(response) {
                    $('#gennumberform').val(response); // サーバーのレスポンスをフォームにセット
                },
                error: function() {
                    // エラーハンドリング
                    alert('エラーが発生しました');
                }
            });
        }
    </script>
</body>

</html>
